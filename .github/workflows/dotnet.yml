name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore Zorg320.Utilitaire.FichierTemporaire.sln
    - name: Build
      run: dotnet build Zorg320.Utilitaire.FichierTemporaire.sln --no-restore
    - name: Test
      run: dotnet test Zorg320.Utilitaire.FichierTemporaire.sln --no-build --verbosity normal

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build image API
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.api
        push: false
    - name: Build image Worker
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.worker
        push: false
